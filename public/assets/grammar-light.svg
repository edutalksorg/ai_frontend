<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg_grad_blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <filter id="shadow_blue" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e40af" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg_grad_blue)"/>

  <!-- Decorative Blobs -->
  <circle cx="100" cy="100" r="150" fill="#3b82f6" fill-opacity="0.03"/>
  <circle cx="700" cy="500" r="200" fill="#3b82f6" fill-opacity="0.05"/>

  <!-- Book/Grammar Elements -->
  <g filter="url(#shadow_blue)">
    <rect x="340" y="240" width="120" height="120" rx="30" fill="white"/>
    <path d="M370 280 H430 V320 H370 Z" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linejoin="round"/>
    <path d="M370 290 H430 M370 300 H410 M370 310 H430" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
    <circle cx="415" cy="275" r="15" fill="#3b82f6" fill-opacity="0.2"/>
    <path d="M415 270 V280 M410 275 H420" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Floating particles -->
  <circle cx="200" cy="200" r="4" fill="#3b82f6" opacity="0.3"/>
  <circle cx="250" cy="400" r="6" fill="#3b82f6" opacity="0.2"/>
  <circle cx="600" cy="150" r="5" fill="#3b82f6" opacity="0.4"/>
</svg>
