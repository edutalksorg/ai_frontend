<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    
    <!-- Emerald Theme Gradients -->
    <linearGradient id="main_emerald" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    
    <!-- Glass Effect -->
    <linearGradient id="glass_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.2"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow_emerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg_grad)"/>

  <!-- Decorative Abstract Shapes -->
  <circle cx="700" cy="100" r="150" fill="#10b981" fill-opacity="0.05"/>
  <path d="M50 400 C 150 300 150 500 250 400 S 350 300 450 400" stroke="#10b981" stroke-width="2" fill="none" opacity="0.2"/>

  <!-- Glowing Frequency Waves -->
  <g filter="glow_emerald" opacity="0.4" transform="translate(100, 450)">
    <rect x="0" y="-10" width="10" height="20" rx="5" fill="#10b981"/>
    <rect x="25" y="-30" width="10" height="60" rx="5" fill="#10b981"/>
    <rect x="50" y="-50" width="10" height="100" rx="5" fill="#10b981"/>
    <rect x="75" y="-20" width="10" height="40" rx="5" fill="#10b981"/>
    <rect x="100" y="-40" width="10" height="80" rx="5" fill="#10b981"/>
    <rect x="125" y="-60" width="10" height="120" rx="5" fill="#10b981"/>
    <rect x="150" y="-30" width="10" height="60" rx="5" fill="#10b981"/>
    <rect x="550" y="-20" width="10" height="40" rx="5" fill="#10b981" opacity="0.5"/>
    <path d="M200 0 H500" stroke="#10b981" stroke-width="4" stroke-dasharray="10 10"/>
  </g>

  <!-- Premium 3D Mic Icon Container -->
  <g transform="translate(250, 150)">
    <!-- Main 3D Shape -->
    <rect x="0" y="0" width="300" height="300" rx="60" fill="url(#main_emerald)"/>
    
    <!-- Glass Overlay -->
    <rect x="40" y="40" width="220" height="220" rx="40" fill="url(#glass_grad)" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
    
    <!-- Mic Icon -->
    <rect x="130" y="90" width="40" height="80" rx="20" fill="white"/>
    <path d="M110 140 C 110 170 135 190 150 190 S 190 170 190 140" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M150 190 V220 M120 220 H180" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Floating Particles -->
  <circle cx="200" cy="100" r="10" fill="#10b981" opacity="0.2"/>
  <rect x="650" y="400" width="15" height="15" rx="4" fill="#10b981" opacity="0.1" transform="rotate(-20 657.5 407.5)"/>
</svg>
