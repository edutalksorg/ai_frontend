<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    
    <!-- Blue Theme Gradients -->
    <linearGradient id="main_blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    
    <!-- Glass Effect -->
    <linearGradient id="glass_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.2"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow_blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg_grad)"/>

  <!-- Decorative Abstract Shapes -->
  <circle cx="600" cy="150" r="120" fill="#3b82f6" fill-opacity="0.05"/>
  <rect x="100" y="350" width="180" height="180" rx="50" fill="#3b82f6" fill-opacity="0.03" transform="rotate(-15 190 440)"/>

  <!-- Floating Grammar Elements -->
  <g filter="glow_blue" opacity="0.3">
    <text x="100" y="200" font-family="serif" font-size="80" fill="#3b82f6" font-weight="bold">Aa</text>
    <text x="650" y="500" font-family="serif" font-size="60" fill="#3b82f6" font-weight="bold">{"{}"}</text>
  </g>

  <!-- Premium 3D Book Icon Container -->
  <g transform="translate(250, 150)">
    <!-- Main 3D Shape -->
    <rect x="0" y="0" width="300" height="300" rx="60" fill="url(#main_blue)"/>
    
    <!-- Glass Overlay -->
    <rect x="40" y="40" width="220" height="220" rx="40" fill="url(#glass_grad)" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
    
    <!-- Book Details -->
    <path d="M100 100 H200 V200 H100 Z" fill="white" fill-opacity="0.2"/>
    <path d="M120 120 H180 M120 140 H180 M120 160 H150" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <circle cx="210" cy="90" r="20" fill="white"/>
    <path d="M210 80 V100 M200 90 H220" stroke="#3b82f6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Floating Particles -->
  <rect x="200" y="100" width="10" height="10" fill="#3b82f6" opacity="0.2" transform="rotate(45 205 105)"/>
  <circle cx="600" cy="400" r="8" fill="#3b82f6" opacity="0.3"/>
</svg>
