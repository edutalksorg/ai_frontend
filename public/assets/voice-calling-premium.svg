<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff5f5"/>
    </linearGradient>
    
    <!-- Red Theme Gradients -->
    <linearGradient id="main_red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    
    <!-- Glass Effect -->
    <linearGradient id="glass_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.2"/>
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow_red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <filter id="glass_blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg_grad)"/>

  <!-- Decorative Abstract Shapes -->
  <circle cx="200" cy="150" r="100" fill="#ef4444" fill-opacity="0.05"/>
  <rect x="550" y="400" width="150" height="150" rx="40" fill="#ef4444" fill-opacity="0.03" transform="rotate(15 625 475)"/>

  <!-- Glowing Sound Waves Group -->
  <g filter="glow_red" opacity="0.4">
    <path d="M100 400 Q 250 150 400 300 T 700 200" stroke="#ef4444" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M100 350 Q 250 100 400 250 T 700 150" stroke="#ef4444" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Premium 3D Phone Icon Container -->
  <g transform="translate(250, 150)">
    <!-- Main 3D Shape -->
    <rect x="0" y="0" width="300" height="300" rx="60" fill="url(#main_red)" shadow="0 20 40 rgba(239, 68, 68, 0.3)"/>
    
    <!-- Glass Overlay -->
    <rect x="40" y="40" width="220" height="220" rx="40" fill="url(#glass_grad)" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
    
    <!-- Speaker Icon -->
    <path d="M120 130 H140 L170 100 V200 L140 170 H120 V130 Z" fill="white"/>
    <path d="M185 130 C 195 130 205 140 205 150 S 195 170 185 170" stroke="white" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M185 110 C 205 110 225 130 225 150 S 205 190 185 190" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.5"/>
  </g>

  <!-- Floating Particles -->
  <circle cx="150" cy="450" r="8" fill="#ef4444" opacity="0.2"/>
  <circle cx="650" cy="100" r="12" fill="#ef4444" opacity="0.1"/>
  <circle cx="720" cy="420" r="6" fill="#ef4444" opacity="0.3"/>
</svg>
